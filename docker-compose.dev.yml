# LiveKit SFU + Caddy proxy for LOCAL DEVELOPMENT.
#
# The production stack (docker-compose.yml) runs LiveKit with
# network_mode: host — which does not work on Docker Desktop (Windows/macOS),
# where the engine lives in a VM. This dev file uses a normal bridge network
# with explicit port mappings instead, so it works on every OS.
#
# The web and server you still run on the host with `bun dev` (fast hot
# reload). This file provides the SFU and a Caddy reverse-proxy that mirrors
# the production proxy layer — so cross-origin / CORS / proxy bugs surface
# locally instead of only on the VPS.
#
# Start:  docker compose -f docker-compose.dev.yml up
# Stop:   docker compose -f docker-compose.dev.yml down
#
# Then run the API and client on the host (bun dev) and open the app at
# http://chatovo.localhost — NOT localhost:3000 — so traffic goes through
# Caddy. See infra/caddy/Caddyfile.dev for the matching env values.

services:
  postgres:
    # Local Postgres for `bun dev`. The API runs on the host and connects via
    # the published port, so DATABASE_URL/DIRECT_URL in apps/server/.env point
    # at localhost:5432 (NOT the compose service name). Credentials come from
    # apps/server/.env (the same file `bun dev` reads). Data lives in its own
    # pgdata_dev volume, isolated from the production pgdata.
    image: postgres:17-alpine
    container_name: chatovo-postgres-dev
    # env_file delivers POSTGRES_* into the container at runtime; the postgres
    # entrypoint reads them directly. Do NOT add an `environment: ${POSTGRES_*}`
    # block — Compose resolves ${...} from the shell / root .env at parse time
    # (NOT from env_file), so it would inject blank values and the container
    # would refuse to start ("POSTGRES_PASSWORD must be non-empty").
    env_file:
      - ./apps/server/.env
    # Published on 5433 (not 5432) to avoid colliding with a host-installed
    # Postgres that already binds 5432 — DATABASE_URL/DIRECT_URL use localhost:5433.
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  livekit:
    image: livekit/livekit-server:v1.12.0
    container_name: chatovo-livekit-dev
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880" # WebSocket signalling
      - "7881:7881" # TCP fallback for WebRTC media
      # UDP media range. Must match port_range_start/end in infra/livekit/livekit.dev.yaml.
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./infra/livekit/livekit.dev.yaml:/etc/livekit.yaml:ro
    # Lets the container reach the API running on the host (bun dev, :4000)
    # for webhook delivery. Implicit on Docker Desktop, explicit here for Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  caddy:
    image: caddy:2-alpine
    container_name: chatovo-caddy-dev
    ports:
      - "80:80" # HTTP — Caddy redirects to HTTPS
      - "443:443" # HTTPS — all three *.localhost sites (HTTP/2)
    volumes:
      - ./infra/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      # Persists the locally-issued CA + certs so the trusted root survives
      # container restarts (otherwise the CA regenerates and trust breaks).
      - caddy_dev_data:/data
    # Caddy proxies chatovo.localhost / api.chatovo.localhost to `bun dev`
    # running on the host; livekit.chatovo.localhost to the SFU container.
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  caddy_dev_data:
  pgdata_dev:
