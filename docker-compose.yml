# Chatovo production stack — runs on the Timeweb Cloud VPS.
#
#   web     — static Next.js client + Caddy (serves the site, proxies /api,
#             terminates HTTPS); the only public-facing container
#   server  — Hono API on Bun
#
# Both images are built on CI and pushed to the private GitHub Container
# Registry (ghcr.io). The VPS builds nothing — it only pulls ready images.
# The VPS must be logged in to ghcr.io once (see DEPLOY.md).
#
# The VPS does NOT have a clone of the repository. Only two files live on it,
# side by side in one directory:
#   docker-compose.yml  — copied here by CI on every deploy
#   .env                — created once by hand with production values
#
# Pull latest & restart: docker compose pull && docker compose up -d
# Logs:                  docker compose logs -f
# Stop:                  docker compose down

services:
  web:
    # Image built and pushed by CI. Replace the owner if the GitHub account
    # differs — it must be lowercase.
    image: ghcr.io/zilero232/chatovo-web:latest
    container_name: chatovo-web
    restart: always
    depends_on:
      - server
    ports:
      # 80 is required for the Let's Encrypt HTTP challenge; 443 serves HTTPS.
      - "80:80"
      - "443:443"
    volumes:
      # Persists issued TLS certificates across restarts.
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - chatovo

  server:
    # Image built and pushed by CI. Replace the owner if the GitHub account
    # differs — it must be lowercase.
    image: ghcr.io/zilero232/chatovo-server:latest
    container_name: chatovo-server
    restart: always
    env_file:
      # Sits next to this compose file on the VPS. Create it once from the
      # apps/server/.env.example template in the repo, with production values.
      - ./.env
    expose:
      # Reachable only inside the compose network — not published to the host.
      - "4000"
    networks:
      - chatovo
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  caddy_data:
  caddy_config:

networks:
  chatovo:
    driver: bridge
