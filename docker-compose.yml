# Chatovo production stack — runs on the Timeweb Cloud VPS.
#
#   web      — static Next.js client + Caddy (serves the site, proxies /api
#              and the LiveKit WebSocket, terminates HTTPS); the only
#              public-facing HTTP container
#   server   — Hono API on Bun
#   livekit  — self-hosted LiveKit SFU (WebRTC voice/video). Uses host networking
#              so WebRTC media ports work directly without Docker NAT.
#
# The web and server images are built on CI and pushed to the private GitHub
# Container Registry (ghcr.io). LiveKit uses the official upstream image from
# Docker Hub. The VPS builds nothing — it only pulls ready images. The VPS
# must be logged in to ghcr.io once (see DEPLOY.md).
#
# The VPS does NOT have a clone of the repository. The following files live
# in one directory, side by side:
#   docker-compose.yml      — copied here by CI on every deploy
#   .env                    — created once by hand with production values
#   livekit.yaml            — created once by hand (LiveKit server config,
#                             contains LIVEKIT_API_KEY / LIVEKIT_API_SECRET)
#
# Pull latest & restart: docker compose pull && docker compose up -d
# Logs:                  docker compose logs -f
# Stop:                  docker compose down

services:
  web:
    # Image built and pushed by CI. Replace the owner if the GitHub account
    # differs — it must be lowercase.
    image: ghcr.io/zilero232/chatovo-web:latest
    container_name: chatovo-web
    restart: always
    depends_on:
      - server
    ports:
      # 80 is required for the Let's Encrypt HTTP challenge; 443 serves HTTPS.
      - "80:80"
      - "443:443"
    volumes:
      # Persists issued TLS certificates across restarts.
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - chatovo
    # Caddy reverse-proxies the livekit.chatovo.ru subdomain to the LiveKit
    # container, which runs with network_mode: host (so it's reachable from
    # this bridge-networked container only via the host gateway).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    # Self-hosted Postgres — replaces Supabase's managed database. Data persists
    # in the pgdata volume. Credentials and DB name come from ./.env.
    image: postgres:17-alpine
    container_name: chatovo-postgres
    restart: always
    # env_file delivers POSTGRES_* into the container; the postgres entrypoint
    # reads them directly. No `environment: ${POSTGRES_*}` block — Compose
    # resolves ${...} from the shell / root .env at parse time (NOT from a
    # service env_file), so it is redundant here and a blank-injection trap if
    # the env_file path ever diverges from the root .env.
    env_file:
      - ./.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - chatovo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  server:
    # Image built and pushed by CI. Replace the owner if the GitHub account
    # differs — it must be lowercase.
    image: ghcr.io/zilero232/chatovo-server:latest
    container_name: chatovo-server
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      # Sits next to this compose file on the VPS. Create it once from the
      # apps/server/.env.example template in the repo, with production values.
      - ./.env
    expose:
      # Reachable only inside the compose network — not published to the host.
      - "4000"
    volumes:
      # Uploaded files (avatars, chat attachments) persist here and are served
      # by the server under /uploads. UPLOADS_DIR in .env must point here.
      - uploads:/app/apps/server/uploads
    networks:
      - chatovo
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  livekit:
    # Official upstream image — not built by CI. Pinned to a specific version:
    # `latest` re-checks the Docker Hub manifest on every deploy (and counts
    # against the anonymous pull rate limit); a pinned tag lets `docker compose
    # pull` short-circuit once the image is cached on the VPS. Bump deliberately.
    image: livekit/livekit-server:v1.12.0
    container_name: chatovo-livekit
    restart: always
    # Host networking is required for WebRTC: the SFU advertises ICE candidates
    # with the host's real IP and binds the UDP media port range directly on
    # the host. Behind Docker's bridge NAT, the published candidates would not
    # be reachable and media would fail to establish.
    network_mode: host
    command: --config /etc/livekit.yaml
    volumes:
      # Sits next to this compose file on the VPS. Create it once from the
      # infra/livekit/livekit.yaml template in the repo, filling in the
      # generated API key / secret and the external (server) IP address.
      - ./livekit.yaml:/etc/livekit.yaml:ro

volumes:
  caddy_data:
  caddy_config:
  pgdata:
  uploads:

networks:
  chatovo:
    driver: bridge
