name: Release Desktop App

# Builds the Tauri desktop app for Windows, macOS and Linux and publishes the
# artifacts to a GitHub Release. The Tauri updater (configured in
# apps/tauri/tauri.conf.json) reads `latest.json` from the same release, so
# users get auto-updates once the release goes live.
#
# Trigger: automatically on push to master when the root `package.json` changes,
# or manually via "Run workflow" in the GitHub Actions UI. The version is the
# single source of truth at `package.json#version`; the build step writes it
# into apps/tauri/{package.json,tauri.conf.json,Cargo.toml,Cargo.lock} (which
# are kept at 0.0.0 in the repo). Release is tagged `app-vX.Y.Z`. If a release
# with that tag already exists, the build is skipped (idempotent — safe to
# re-run on merges that don't bump the version).
#
# Required GitHub repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY            Minisign private key (matches `plugins.updater.pubkey`
#                                        already committed in tauri.conf.json).
#                                        Generate once with: bun run signer:generate (in apps/tauri).
#                                        Key is created without a password — see apps/tauri/package.json.
#   NEXT_PUBLIC_API_URL                  Absolute API URL baked into the desktop bundle
#                                        (e.g. https://api.chatovo.ru). Shared with the
#                                        web deploy — both web and desktop hit the same
#                                        cross-origin API host, allowed by server CORS.
#   NEXT_PUBLIC_LIVEKIT_URL              LiveKit signalling URL (wss://...).
#
# Optional (not configured yet, leave unset → unsigned macOS build with warning):
#   APPLE_CERTIFICATE                   Base64 of the .p12 codesigning certificate
#   APPLE_CERTIFICATE_PASSWORD          .p12 password
#   APPLE_SIGNING_IDENTITY              e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID   for notarization

on:
  push:
    branches: [master]
    paths:
      - 'package.json'
  workflow_dispatch: {}

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.read.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      # Root package.json is the single source of truth for the desktop app version.
      # `jq -r` extracts the raw value (e.g. 0.1.2 without quotes) for downstream jobs.
      - name: Read version from root package.json
        id: read
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      # Skip the build if a release with this tag already exists. Keeps the
      # push trigger idempotent — merges that touch package.json without
      # bumping the version won't double-release.
      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="app-v${{ steps.read.outputs.version }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists — skipping build."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $tag does not exist — proceeding."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve-version
    if: needs.resolve-version.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Single source of truth for the desktop app version is the root package.json.
      # In the repo, apps/tauri/{package.json,tauri.conf.json,Cargo.toml,Cargo.lock}
      # are all pinned to 0.0.0 — this step rewrites them to the real version before
      # the build so bundle filenames (.msi/.dmg/.deb) and latest.json carry it.
      - name: Sync Tauri version from root package.json
        shell: bash
        working-directory: apps/tauri
        run: |
          version="${{ needs.resolve-version.outputs.version }}"
          echo "Syncing all manifests to version $version"

          # apps/tauri/package.json — workspace manifest
          jq --arg v "$version" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

          # tauri.conf.json — drives bundle filenames + updater feed
          jq --arg v "$version" '.version = $v' tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp tauri.conf.json

          # Cargo.toml — only the [package] version, not dependency versions
          sed -i.bak -E '/^\[package\]/,/^\[/ s/^version = "[^"]*"/version = "'"$version"'"/' Cargo.toml
          rm Cargo.toml.bak

          # Cargo.lock — match the chatovo package entry so --frozen-lockfile passes
          sed -i.bak -E '/^name = "chatovo"$/{n;s/^version = "[^"]*"/version = "'"$version"'"/;}' Cargo.lock
          rm Cargo.lock.bak

          echo "--- apps/tauri/package.json ---"
          jq .version package.json
          echo "--- tauri.conf.json ---"
          jq .version tauri.conf.json
          echo "--- Cargo.toml ---"
          grep -m1 '^version' Cargo.toml
          echo "--- Cargo.lock (chatovo) ---"
          grep -A1 '^name = "chatovo"$' Cargo.lock | tail -1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal binary on macOS needs both targets; harmless on other OS.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo registry & target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri -> target

      # Tauri on Ubuntu needs the WebKit / GTK system libs.
      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # Skip postinstall (which runs `prisma generate` and reads DIRECT_URL)
      # because CI lacks DIRECT_URL.
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # Tauri ships the client's static export. The client's tsc step type-checks
      # apps/server (transitive types), which imports the generated Prisma client.
      # Generate it explicitly — `prisma generate` doesn't connect to the DB, but
      # prisma.config.ts resolves `env('DIRECT_URL')` at load time and crashes if
      # unset, so we pass a dummy value just to satisfy the resolver.
      - name: Generate Prisma client
        working-directory: apps/server
        env:
          DIRECT_URL: 'postgresql://ci:ci@localhost:5432/ci'
        run: bunx prisma generate

      - name: Build & release desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # NEXT_PUBLIC_* are baked into the static export that Tauri ships.
          # Same NEXT_PUBLIC_API_URL secret as the web deploy — both targets point
          # at https://api.chatovo.ru. Tauri's origin (tauri://localhost) cannot
          # resolve a relative URL, so the value must be absolute.
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_LIVEKIT_URL: ${{ secrets.NEXT_PUBLIC_LIVEKIT_URL }}
          # macOS code signing & notarization is not configured yet — leaving the
          # APPLE_* env vars unset produces an unsigned .app (Gatekeeper warning
          # on first launch, but it installs). Re-add them when Apple Developer
          # account secrets are set. Passing empty strings here would make
          # tauri-action try to import an empty certificate and fail the build.
        with:
          projectPath: apps/tauri
          tagName: app-v${{ needs.resolve-version.outputs.version }}
          releaseName: 'Chatovo v${{ needs.resolve-version.outputs.version }}'
          releaseBody: |
            Desktop builds of Chatovo v${{ needs.resolve-version.outputs.version }}.

            - Windows: `.msi` installer
            - macOS: `.dmg` (universal: Apple Silicon + Intel)
            - Linux: `.deb` and `.AppImage`

            The app auto-updates on launch via the built-in Tauri updater.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
