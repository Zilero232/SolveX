name: Release Desktop App

# Builds the Tauri desktop app for Windows, macOS and Linux and publishes the
# artifacts to a GitHub Release. The Tauri updater (configured in
# apps/tauri/tauri.conf.json) reads `latest.json` from the same release, so
# users get auto-updates once the release goes live.
#
# Trigger: manual via "Run workflow" in the GitHub Actions UI. Bump
# `apps/tauri/package.json#version` and `apps/tauri/tauri.conf.json#version`
# before triggering — the release is named after that version (tag `app-vX.Y.Z`).
#
# Required GitHub repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY           Minisign private key (matches `plugins.updater.pubkey`
#                                       already committed in tauri.conf.json).
#                                       Generate once with: bun tauri signer generate -w ~/.tauri/chatovo.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  Password set when generating the key (use "" if none).
#
# NEXT_PUBLIC_* values that get baked into the static Next.js export consumed
# by Tauri are read from the same secrets used by the web deploy workflow.
#
# Optional (not configured yet, leave unset → unsigned macOS build with warning):
#   APPLE_CERTIFICATE                   Base64 of the .p12 codesigning certificate
#   APPLE_CERTIFICATE_PASSWORD          .p12 password
#   APPLE_SIGNING_IDENTITY              e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID   for notarization

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.1) — must match apps/tauri/package.json'
        required: true
        type: string

concurrency:
  group: release-desktop-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal binary on macOS needs both targets; harmless on other OS.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo registry & target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri -> target

      # Tauri on Ubuntu needs the WebKit / GTK system libs.
      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # Same pattern as the web deploy: skip postinstall (prisma generate)
      # because Tauri build doesn't need it and CI lacks DIRECT_URL.
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build & release desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # NEXT_PUBLIC_* are baked into the static export that Tauri ships.
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_LIVEKIT_URL: ${{ secrets.NEXT_PUBLIC_LIVEKIT_URL }}
          # macOS code signing & notarization (optional — skipped if unset).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/tauri
          tagName: app-v${{ github.event.inputs.version }}
          releaseName: 'Chatovo v${{ github.event.inputs.version }}'
          releaseBody: |
            Desktop builds of Chatovo v${{ github.event.inputs.version }}.

            - Windows: `.msi` installer
            - macOS: `.dmg` (universal: Apple Silicon + Intel)
            - Linux: `.deb` and `.AppImage`

            The app auto-updates on launch via the built-in Tauri updater.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
